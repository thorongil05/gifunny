<form
  [formGroup]="this.formGroup"
  (ngSubmit)="this.search()"
  (keydown.enter)="this.search()"
>
  <mat-form-field class="search-form-field" appearance="outline">
    <mat-label>Query</mat-label>
    <input matInput type="text" [formControl]="this.queryFormControl" />
    @if (this.queryFormControl.invalid) {
      <mat-error> Query is <strong>required</strong> </mat-error>
    }
    <button mat-icon-button matSuffix type="submit">
      <mat-icon>search</mat-icon>
    </button>
  </mat-form-field>
</form>
