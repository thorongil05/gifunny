server {
    listen 80;

    root /usr/share/nginx/html/browser;
    index index.html;

    location /gifs {
        proxy_pass http://backend:5000/gifs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
